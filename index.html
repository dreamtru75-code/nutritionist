<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식생활교육관 재고관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 선생님이 캡처해서 보내주신 바로 그 설정값입니다!
        const firebaseConfig = {
            apiKey: "AIzaSyB69bzC_SvwZk4LNOzSlr04ZxW_V2DMl88",
            authDomain: "school-lunch-f22bf.firebaseapp.com",
            databaseURL: "https://school-lunch-f22bf-default-rtdb.firebaseio.com",
            projectId: "school-lunch-f22bf",
            storageBucket: "school-lunch-f22bf.firebasestorage.app",
            messagingSenderId: "969988822893",
            appId: "1:969988822893:web:b171adfa4ec620d9802c64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 데이터 저장 함수
        window.saveData = function() {
            const itemName = document.getElementById('itemName').value;
            const count = document.getElementById('count').value;
            
            if(itemName && count) {
                set(ref(db, 'inventory/' + itemName), {
                    quantity: count,
                    updatedAt: new Date().toLocaleString()
                }).then(() => {
                    alert("저장되었습니다!");
                    document.getElementById('itemName').value = '';
                    document.getElementById('count').value = '';
                });
            } else {
                alert("항목과 수량을 입력해주세요.");
            }
        };

        // 실시간 데이터 불러오기
        const inventoryList = document.getElementById('inventoryList');
        onValue(ref(db, 'inventory'), (snapshot) => {
            const data = snapshot.val();
            inventoryList.innerHTML = '';
            for (let id in data) {
                const li = document.createElement('li');
                li.className = "p-3 border-b flex justify-between";
                li.innerHTML = `<span><strong>${id}</strong>: ${data[id].quantity}개</span> <span class='text-gray-400 text-sm'>${data[id].updatedAt}</span>`;
                inventoryList.appendChild(li);
            }
        });
    </script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-center text-green-600">🍎 식생활교육관 재고관리</h1>
        
        <div class="space-y-4 mb-8">
            <input type="text" id="itemName" placeholder="품목명 (예: 사과)" class="w-full p-2 border rounded">
            <input type="number" id="count" placeholder="수량" class="w-full p-2 border rounded">
            <button onclick="saveData()" class="w-full bg-green-500 text-white p-3 rounded font-bold hover:bg-green-600">데이터 저장하기</button>
        </div>

        <div class="border-t pt-4">
            <h2 class="text-lg font-semibold mb-3 text-gray-700">현재 재고 현황</h2>
            <ul id="inventoryList" class="bg-gray-50 rounded"></ul>
        </div>
    </div>
</body>
</html>
