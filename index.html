<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식재료 재고 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">🍎 식재료 재고 관리</h1>
            <button onclick="addNewItem()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                + 품목 추가
            </button>
        </header>

        <!-- 재고 현황판 -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">현재 재고 목록</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-sm border-b">
                            <th class="py-2 px-2">품목명</th>
                            <th class="py-2 px-2">수량</th>
                            <th class="py-2 px-2">유통기한</th>
                            <th class="py-2 px-2">관리</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list">
                        <!-- 데이터가 여기에 표시됩니다 -->
                    </tbody>
                </table>
            </div>
            <div id="empty-msg" class="text-center py-10 text-gray-400 hidden">
                등록된 재고가 없습니다.
            </div>
        </div>

        <!-- 안내 문구 -->
        <div class="text-center text-sm text-gray-500">
            데이터는 브라우저(localStorage)에 안전하게 저장됩니다.
        </div>
    </div>

    <!-- 추가/수정 모달 (임시 알림창으로 대체 가능하나 UI를 위해 제작) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 id="modal-title" class="text-xl font-bold mb-4">품목 추가</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">품목명</label>
                    <input type="text" id="item-name" class="w-full border rounded-lg p-2 mt-1" placeholder="예: 사과">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">수량</label>
                    <input type="number" id="item-count" class="w-full border rounded-lg p-2 mt-1" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">유통기한</label>
                    <input type="date" id="item-date" class="w-full border rounded-lg p-2 mt-1">
                </div>
            </div>
            <div class="mt-6 flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">취소</button>
                <button onclick="saveItem()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">저장</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('stock_data')) || [];
        let editingIndex = -1;

        function render() {
            const list = document.getElementById('inventory-list');
            const emptyMsg = document.getElementById('empty-msg');
            list.innerHTML = '';

            if (inventory.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                inventory.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b hover:bg-gray-50 transition';
                    tr.innerHTML = `
                        <td class="py-3 px-2 font-medium">${item.name}</td>
                        <td class="py-3 px-2">${item.count}개</td>
                        <td class="py-3 px-2 text-sm text-gray-600">${item.date || '-'}</td>
                        <td class="py-3 px-2">
                            <button onclick="editItem(${index})" class="text-blue-500 mr-2 text-sm">수정</button>
                            <button onclick="deleteItem(${index})" class="text-red-500 text-sm">삭제</button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            }
            localStorage.setItem('stock_data', JSON.stringify(inventory));
        }

        function addNewItem() {
            editingIndex = -1;
            document.getElementById('modal-title').innerText = "품목 추가";
            document.getElementById('item-name').value = '';
            document.getElementById('item-count').value = '';
            document.getElementById('item-date').value = '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function saveItem() {
            const name = document.getElementById('item-name').value;
            const count = document.getElementById('item-count').value;
            const date = document.getElementById('item-date').value;

            if (!name) {
                alert('품목명을 입력해주세요.');
                return;
            }

            const itemData = { name, count, date };

            if (editingIndex > -1) {
                inventory[editingIndex] = itemData;
            } else {
                inventory.push(itemData);
            }

            render();
            closeModal();
        }

        function editItem(index) {
            editingIndex = index;
            const item = inventory[index];
            document.getElementById('modal-title').innerText = "품목 수정";
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-count').value = item.count;
            document.getElementById('item-date').value = item.date;
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteItem(index) {
            if (confirm('정말 삭제하시겠습니까?')) {
                inventory.splice(index, 1);
                render();
            }
        }

        // 초기 실행
        window.onload = render;
    </script>
</body>
</html>
